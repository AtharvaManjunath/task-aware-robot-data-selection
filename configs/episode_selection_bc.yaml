dataset:
  path: data/robot_episodes.json
  language_keys: [language, instruction, task_description]
  image_keys: [images, frames, rgb]
  action_key: actions
  gripper_key: gripper

output_dir: outputs/episode_selection_bc
selectors:
  - random
  - language_similarity
  - language_vision_diversity
  - quality_filtered
budgets: [0.05, 0.10, 0.20, 0.40, 0.60, 0.80, 1.0]
budget_type: storage_fraction
budget:
  allow_oversized_first: true
seeds: [0, 1, 2]
include_full_data_baseline: true

split:
  train_fraction: 0.70
  val_fraction: 0.15
  seed: 13

metadata:
  embeddings:
    provider: none
    dim: 64
    allow_deterministic_fallback: false
  frame_sampling:
    strategy: middle
    max_frames: 1
  multimodal_language_weight: 0.5
  quality:
    min_len: 1
    max_len:
    weights:
      success: 3.0
      reward: 1.0
      human_rating: 1.0
      completion: 1.0
      intervention_free: 1.0
      smoothness: 0.5
      validity: 1.0
      length_sanity: 0.5

selector_config:
  language_similarity:
    queries: []
    query_aggregation: max
  language_vision_diversity:
    queries: []
    mmr_lambda: 0.5
    allow_language_only_fallback: true

training:
  adapter: linear_bc
  ridge: 0.0001

evaluation:
  gripper_threshold: 0.5

plotting:
  enabled: true
